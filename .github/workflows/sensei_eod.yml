name: Sensei EOD

on:
  schedule:
    # 14:41 UTC Mon-Fri = 20:11 IST. Off the half-hour mark: GitHub's
    # free-tier cron skipped the 14:30 slot entirely on 10/06/2026 (top
    # of hour and half-hour are the most congested slots). The bot's
    # in-process 20:05 IST job is the primary; this is the fallback.
    # Sensei self-grades before synthesizing, so double runs are
    # idempotent and ordering vs the grader no longer matters.
    - cron: "41 14 * * 1-5"
  workflow_dispatch:
    inputs:
      analysis_id:
        description: "Specific analysis id to retrospect on (optional, latest row used otherwise)"
        required: false
        type: string

# Same Node-24 force-migration env as the other workflows. Drop once
# action majors ship Node-24-native bundles.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  sensei:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run Sensei EOD synthesis
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_SENSEI_PRIMARY: ${{ secrets.OPENROUTER_SENSEI_PRIMARY }}
        run: |
          if [ -n "${{ inputs.analysis_id }}" ]; then
            python -m analyzer.sensei "${{ inputs.analysis_id }}"
          else
            python -m analyzer.sensei
          fi
