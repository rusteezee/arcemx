name: Sensei EOD

on:
  schedule:
    - cron: "30 14 * * 1-5"  # 14:30 UTC Mon-Fri = 20:00 IST
  workflow_dispatch:
    inputs:
      analysis_id:
        description: "Specific analysis id to retrospect on (optional, latest row used otherwise)"
        required: false
        type: string

# Same Node-24 force-migration env as the other workflows. Drop once
# action majors ship Node-24-native bundles.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  sensei:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run Sensei EOD synthesis
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_SENSEI_PRIMARY: ${{ secrets.OPENROUTER_SENSEI_PRIMARY }}
        run: |
          if [ -n "${{ inputs.analysis_id }}" ]; then
            python -m analyzer.sensei "${{ inputs.analysis_id }}"
          else
            python -m analyzer.sensei
          fi
