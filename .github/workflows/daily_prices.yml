name: Daily Prices Fetch

# Pulls OHLCV history for universe + portfolio tickers via yfinance and
# pushes to Supabase prices table. Required by the portfolio Value Timeline
# chart and by analyzer technical screening.

on:
  schedule:
    # 16:30 UTC Mon-Fri = 22:00 IST (well after NSE 15:30 IST close + EOD
    # data settling).
    - cron: "30 16 * * 1-5"
  workflow_dispatch:

# See daily_analysis.yml for rationale on FORCE_JAVASCRIPT_ACTIONS_TO_NODE24.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Fetch prices
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python -m fetchers.prices
