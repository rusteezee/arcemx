name: Daily Market Analysis

on:
  schedule:
    # 03:13 UTC Mon-Fri = 08:43 IST. FALLBACK layer: the bot's in-process
    # APScheduler owns the 08:30 IST primary run (Render dyno kept warm by
    # cron-job.org pings). This workflow fires 13 minutes later and skips
    # itself when a fresh analysis row already exists (run_if_stale guard),
    # so it only spends quota when the bot was asleep or dead. The :13
    # minute also dodges top-of-hour congestion: GitHub's free-tier cron
    # fired 03:00 UTC nearly 4 hours late on 09/06/2026 and not at all on
    # 10/06/2026.
    - cron: "13 3 * * 1-5"
  workflow_dispatch:

# Opt every JavaScript action onto Node 24 ahead of the 16 June 2026
# forced-migration deadline. actions/checkout@v4 and actions/setup-python@v5
# still ship as Node 20 bundles in their current major; this env var tells
# the runner to execute them under Node 24 instead. Removes the looming
# break without bumping action major versions (which is a separate, larger
# audit). Drop this var once we move to Node-24-native action releases.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      # HuggingFace model cache for Qwen3-Embedding-0.6B (~1.2 GB).
      # Phase 1 RAG retrieval inside feedback.build_feedback() embeds
      # today's tape state at call time; without this cache every
      # morning run would re-download the model, eating ~90 s wall
      # clock and ~2 GB egress.
      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-${{ hashFiles('requirements-embed.txt') }}
      - name: Install (analyzer + embed for Phase 1 retrieval)
        run: |
          pip install -r requirements.txt
          pip install -r requirements-embed.txt
      - name: Run aggregator (skips when the bot already ran this morning)
        id: agg
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # Ensemble fan-out: three dedicated keys (one per parallel
          # worker, two models per key with 6 models + 3 keys) plus
          # legacy comma-separated var for backward compat. The primary
          # OPENROUTER_API_KEY above stays untouched - it serves only
          # the Nemotron Super single-model brain. The numbered slots
          # are the ensemble pool; deduped by analyzer.llm_router so
          # an accidentally duplicated key still produces a clean count.
          OPENROUTER_API_KEY_1: ${{ secrets.OPENROUTER_API_KEY_1 }}
          OPENROUTER_API_KEY_2: ${{ secrets.OPENROUTER_API_KEY_2 }}
          OPENROUTER_API_KEY_3: ${{ secrets.OPENROUTER_API_KEY_3 }}
          OPENROUTER_API_KEYS: ${{ secrets.OPENROUTER_API_KEYS }}
          OPENROUTER_ENSEMBLE: ${{ secrets.OPENROUTER_ENSEMBLE }}
          OPENROUTER_ENSEMBLE_MODELS: ${{ secrets.OPENROUTER_ENSEMBLE_MODELS }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
          # Manual dispatches always run; only the scheduled fallback
          # defers to a fresh row from the bot's 08:30 IST primary run.
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          python - <<'EOF'
          import os
          from analyzer.aggregator import run, run_if_stale
          if os.getenv("FORCE_RUN") == "true":
              res = run()
          else:
              res = run_if_stale(max_age_minutes=90)
          ran = res is not None and not (res or {}).get("error")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"ran={'true' if ran else 'false'}\n")
          EOF
      - name: Push to Telegram
        # Only when THIS workflow produced the analysis. When the bot's
        # 08:30 run produced it, the bot already pushed the daily call.
        if: steps.agg.outputs.ran == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m bot.daily_push
