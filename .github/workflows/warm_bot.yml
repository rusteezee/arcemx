name: Warm Render Bot

# Render free tier sleeps after 15 min idle. Ping bot every 10 min to keep it warm
# during waking hours so the dashboard sync button responds instantly.

on:
  schedule:
    - cron: "*/10 0-19 * * *"  # every 10 min, 00:00-19:59 UTC = 5:30 AM - 1:29 AM IST
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping bot health endpoint
        run: |
          set -e
          URL="${BOT_URL:-https://arcemx.onrender.com/health}"
          echo "Pinging $URL"
          # Render free tier cold-start sometimes exceeds 60s, or the
          # network blips. Retry up to 3 times with backoff before
          # failing so a single slow wake doesn't mark the workflow red.
          for attempt in 1 2 3; do
            status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 "$URL" || echo "000")
            echo "Attempt $attempt -> HTTP $status"
            if [ "$status" -ge 200 ] && [ "$status" -lt 400 ]; then
              echo "Bot warm."
              exit 0
            fi
            sleep 15
          done
          echo "Warmup ping failed after 3 attempts"
          exit 1
        env:
          BOT_URL: ${{ vars.BOT_URL }}
